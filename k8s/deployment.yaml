apiVersion: apps/v1
kind: Deployment
metadata:
  name: tldr-newsletter-slack
  labels:
    app: tldr-newsletter-slack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tldr-newsletter-slack
  template:
    metadata:
      labels:
        app: tldr-newsletter-slack
    spec:
      containers:
        - name: tldr-newsletter-slack
          image: ghcr.io/adaviscourt/tldr-newsletter-slack:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 5000
          env:
          - name: SLACK_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: slack-api-token
                key: token
          - name: DB_HOST
            value: "postgres"
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            value: "tldr_user"
          - name: DB_PASSWORD
            value: "tldr_password"
          - name: DB_NAME
            value: "tldr_cache"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tldr-newsletter-slack
spec:
  selector:
    app: tldr-newsletter-slack
  type: NodePort
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
